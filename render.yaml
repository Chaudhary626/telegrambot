# ══════════════════════════════════════════════
# Render Blueprint — Auto-deploy configuration
# ══════════════════════════════════════════════
# This file lets Render auto-configure your service
# when you connect your GitHub repo.

services:
  - type: web
    name: telegram-fileid-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py

    # Environment variables (set these in Render Dashboard)
    envVars:
      - key: BOT_TOKEN
        sync: false   # Must be set manually (secret)
      - key: ADMIN_ID
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
